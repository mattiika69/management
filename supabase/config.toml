project_id = "management"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://management-swart-iota.vercel.app"
additional_redirect_urls = [
  "https://management-mattiika69.vercel.app/auth/callback",
  "https://management-mattiika69.vercel.app/update-password",
  "https://management-swart-iota.vercel.app/auth/callback",
  "https://management-swart-iota.vercel.app/update-password",
  "https://management-*-mattiika69.vercel.app/auth/callback",
  "https://management-*-mattiika69.vercel.app/update-password",
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/update-password",
  "http://localhost:3000/**"
]
jwt_expiry = 3600
enable_signup = true
minimum_password_length = 8
password_requirements = "lower_upper_letters_digits"

[auth.rate_limit]
email_sent = 30
sign_in_sign_ups = 30
token_verifications = 30

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m"
otp_length = 8
otp_expiry = 3600

[auth.email.smtp]
enabled = true
host = "smtp.resend.com"
port = 465
user = "resend"
pass = "env(RESEND_API_KEY)"
admin_email = "team@hyperoptimal.com"
sender_name = "HyperOptimal"

[auth.email.template.confirmation]
subject = "Confirm your HyperOptimal Management account"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.magic_link]
subject = "Log in to HyperOptimal Management"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.recovery]
subject = "Reset your HyperOptimal Management password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.invite]
subject = "You're invited to a new workspace"
content_path = "./supabase/templates/invite.html"

[auth.email.template.email_change]
subject = "Confirm your HyperOptimal Management email change"
content_path = "./supabase/templates/email_change.html"

[auth.email.notification.password_changed]
enabled = true
subject = "Your HyperOptimal Management password was changed"
content_path = "./templates/password_changed_notification.html"

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[storage]
enabled = true
file_size_limit = "50MiB"
